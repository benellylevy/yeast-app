<!DOCTYPE html>
<html>
<head>
    <title>Yeast Control Panel</title>
    <style>
        body {
            background-color: #121212;
            color: #eeeeee;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
            margin-top: 20px;
        }

        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 0 10px #00ffcc33;
        }

        input[type="text"], button {
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
            border: none;
            font-size: 1rem;
        }

        button {
            background-color: #00ffcc;
            color: #000;
            cursor: pointer;
        }

        button:hover {
            background-color: #00ddaa;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        .status-light {
          display: inline-block;
          width: 10px;
          height: 10px;
          border-radius: 50%;
          margin-left: 5px;
          border: 1px solid #555;
          background-color: transparent;
        }
        .status-on {
          background-color: limegreen;
        }
        .top-row {
          display: flex;
          justify-content: space-between;
          gap: 20px;
          margin: 0 auto;
          max-width: 1200px;
        }

        #status {
            background-color: #222;
            padding: 15px;
            margin: 0 auto 20px auto;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            color: #00ffcc;
            border-bottom: 1px solid #00ffcc44;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .log-table {
          flex: 1;
          background-color: #1e1e1e;
          padding: 15px;
          border-radius: 8px;
          overflow-y: auto;
          max-height: 400px;
        }

        .graph-panel {
          flex: 2;
          background-color: #1e1e1e;
          padding: 15px;
          border-radius: 8px;
        }

        .bottom-controls {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 10px;
          margin-top: 30px;
        }

        .bottom-controls .row {
          display: flex;
          gap: 15px;
          flex-wrap: wrap;
          justify-content: center;
        }
    </style>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 🧬 Title -->
    <!-- This is the header title of the app -->
    <h1>🧬 Yeast Control Panel</h1>

    <!-- Status Panel -->
    <!-- Shows current status phase of the system -->
    <div class="panel" id="status">
        <p>📡 Status: <span id="status-phase">Acclimation</span></p>
    </div>

    <!-- Path Input Section -->
    <!-- Allows user to select AGG and MQTT folders -->
    <div class="panel" id="path-inputs">
      <h3>🗂 Select Paths</h3>
      <label>AGG Folder:</label>
      <input type="file" id="aggPath" webkitdirectory directory />
      <label>MQTT Folder:</label>
      <input type="file" id="mqttPath" webkitdirectory directory />
      <button onclick="submitPaths()">💾 Save Paths</button>
      <p id="pathStatus" style="color: lime;"></p>
    </div>

    <!-- Main Content: Log Table and Graph -->
    <div class="top-row">
      <!-- Feedback Log Table -->
      <!-- Displays feedback data logs -->
      <div class="log-table">
        <h3>🧾 Feedback Log</h3>
        <table id="feedbackTable">
          <thead><tr><th>#</th><th>val</th><th>temp_send</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Graph Panel -->
      <!-- Shows GFP and Temperature chart -->
      <div class="graph-panel">
        <h3>📈 GFP + Temperature</h3>
        <button onclick="refreshDualChart()">🔄 Refresh Chart</button>
        <span id="lastUpdate" style="color: gray; font-size: 0.9rem; margin-left: 10px;"></span>
        <canvas id="gfpChart" width="700" height="300"></canvas>
      </div>
    </div>

    <!-- Bottom Controls: Buttons to run scripts -->
    <div class="bottom-controls">
      <div class="row">
        <button onclick="runScript('/make_dir', 'make_dir')">Make Dir <span id="status-make_dir" class="status-light"></span></button>
        <button onclick="runScript('/run_baseline', 'run_baseline')">Baseline <span id="status-run_baseline" class="status-light"></span></button>
        <button onclick="runScript('/start_acclimation', 'start_acclimation')">Acclimation ON/OFF <span id="status-start_acclimation" class="status-light"></span></button>
        <button onclick="runScript('/start_feedback', 'start_feedback')">Feedback ON/OFF <span id="status-start_feedback" class="status-light"></span></button>
      </div>
      <div class="row">
        <span>mqtt 🌡️</span><button onclick="runScript('/start_mqtt', 'start_mqtt')">Patch <span id="status-start_mqtt" class="status-light"></span></button>
        <span>analyse 🧪</span>
        <button onclick="runScript('/start_plot', 'start_plot')">Patch <span id="status-start_plot" class="status-light"></span></button>
        <button onclick="runScript('/start_analyse', 'start_analyse')">
          Patch <span id="status-start_analyse" class="status-light"></span>
        </button>
        <button onclick="document.getElementById('analyse-path-panel').style.display = (document.getElementById('analyse-path-panel').style.display === 'none' ? 'block' : 'none');">Show/Update analyse path</button>
      </div>
    </div>

    <!-- Analyse Path Panel -->
    <div class="panel" id="analyse-path-panel" style="display: none;">
      <h3>🔍 Analyse Path</h3>
      <button onclick="loadAnalysePath()">Show Current Path</button>
      <input type="text" id="analysePathInput" style="width: 90%; margin-top: 10px;" placeholder="Path to analyse images...">
      <button onclick="updateAnalysePath()">Update Path</button>
      <p id="analysePathStatus" style="color: lime;"></p>
    </div>

    <!-- Script Output Panel -->
    <!-- Shows output messages from backend scripts -->
    <div class="panel" id="output-panel">
      <h3>📤 Script Output</h3>
      <pre id="scriptOutput" style="color: white; min-height: 100px;"></pre>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      // submitPaths: sends selected folder paths to backend to save them
      function submitPaths() {
          const aggInput = document.getElementById('aggPath');
          const mqttInput = document.getElementById('mqttPath');
          // Get the top-level folder name from the selected files
          const agg = aggInput.files.length ? aggInput.files[0].webkitRelativePath.split("/")[0] : "";
          const mqtt = mqttInput.files.length ? mqttInput.files[0].webkitRelativePath.split("/")[0] : "";

          fetch('/set_paths', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ agg_path: agg, mqtt_path: mqtt })
          }).then(res => res.json())
            .then(data => {
                // Show success message
                document.getElementById('pathStatus').innerText = '✅ Paths set successfully';
            })
            .catch(err => {
                // Show error message
                document.getElementById('pathStatus').innerText = '❌ Failed to set paths';
            });
      }

      // runScript: runs a backend script and updates the output panel and the status light
      function runScript(endpoint, scriptId = "") {
          fetch(endpoint)
              .then(res => res.json())
              .then(data => {
                  // Update script status message
                  document.getElementById('scriptStatus').innerText = '✅ ' + data.status;
                  // Turn on the green light for the script button
                  const light = document.getElementById('status-' + scriptId);
                  if (light) light.classList.add("status-on");
                  // Append output log with timestamp
                  const log = document.getElementById("scriptOutput");
                  log.innerText += `[${new Date().toLocaleTimeString()}] ${scriptId || endpoint} → ${data.status}\n`;
              })
              .catch(err => {
                  // Show error in status and output log
                  document.getElementById('scriptStatus').innerText = '❌ Failed to start script';
                  const log = document.getElementById("scriptOutput");
                  log.innerText += `[${new Date().toLocaleTimeString()}] ${scriptId || endpoint} → ERROR: ${err}\n`;
              });
      }

      // checkRunning: fetch and display currently running scripts (not used visibly in UI but useful for debugging)
      function checkRunning() {
          fetch('/running_processes')
              .then(res => res.json())
              .then(data => {
                  document.getElementById('runningStatus').innerText =
                    Object.keys(data.processes).length > 0
                      ? JSON.stringify(data.processes, null, 2)
                      : 'No scripts running.';
              })
              .catch(err => {
                  document.getElementById('runningStatus').innerText = '❌ Failed to check running scripts';
              });
      }

      // stopScript: stops a running backend script and updates status message
      function stopScript(name) {
          fetch(`/stop_script/${name}`)
              .then(res => res.json())
              .then(data => {
                  document.getElementById('scriptStatus').innerText = '🛑 ' + data.status;
              })
              .catch(err => {
                  document.getElementById('scriptStatus').innerText = '❌ Failed to stop script';
              });
      }

      // Highlighted well number for feedback (1-based index)
      const highlightWell = 1;
      // refreshDualChart: fetches GFP and temperature data and updates the chart on the page
      function refreshDualChart() {
          fetch("/refresh_dual_data")
              .then(res => res.json())
              .then(data => {
                  if (data.error) return; // skip if error
                  const t0 = new Date(data.t0);

                  // צבעים בסיסיים עבור בארות (לשימוש במצב acclimation)
                  const baseColors = [
                      "#00ffcc", "#ffb300", "#e91e63", "#3f51b5", "#009688", "#ff5722", "#8bc34a", "#f44336"
                  ];
                  const grayColor = "#cccccc";
                  const feedbackColor = "#00ffcc";

                  // קביעת מצב ניסוי
                  const phase = data.experimentPhase || "acclimation";
                  // הנחה: data.gfp_data הוא מערך של אובייקטים, כל אחד עם well_number
                  // נזהה את כל בארות הקיימות
                  const wells = [...new Set(data.gfp_data.map(row => row.well_number))];
                  wells.sort((a, b) => a - b);
                  // עבור כל באר, ליצור מערך נקודות שלה
                  const datasets = wells.map((well, idx) => {
                      const points = data.gfp_data
                          .filter(row => row.well_number === well)
                          .map(row => ({
                              x: (new Date(row.Time_Stamp) - t0) / 60000,
                              y: row.mean_F_C2
                          }));
                      let color;
                      if (phase === "acclimation") {
                        // כל באר בצבע שונה
                        color = baseColors[idx % baseColors.length];
                      } else if (phase === "feedback") {
                        // כל הבארות אפור, רק באר הפידבק בצבע
                        color = (well === highlightWell) ? feedbackColor : grayColor;
                      } else {
                        color = baseColors[idx % baseColors.length];
                      }
                      return {
                        label: "Well " + well,
                        data: points,
                        borderColor: color,
                        backgroundColor: color,
                        fill: false,
                        tension: 0.1,
                        pointRadius: 2
                      };
                  });

                  // Prepare temperature data points for chart
                  const tempPoints = data.temp_data.map(row => ({
                      x: (new Date(row.x) - t0) / 60000,
                      y: row.y
                  }));
                  const tempDataset = {
                    label: "Temperature",
                    data: tempPoints,
                    borderColor: "#ff4081",
                    backgroundColor: "#ff4081",
                    fill: false,
                    yAxisID: "y1",
                    borderDash: [4,2],
                    pointRadius: 1
                  };

                  // If chart already exists, update data and redraw
                  if (window.chart) {
                      window.chart.data.datasets = [...datasets, tempDataset];
                      window.chart.update();
                  } else {
                      // If chart does not exist, create it
                      const ctx = document.getElementById('gfpChart').getContext('2d');
                      window.chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                          datasets: [...datasets, tempDataset]
                        },
                        options: {
                          responsive: false,
                          scales: {
                            x: { type: 'linear', title: { display: true, text: 'Minutes' } },
                            y: { type: 'linear', position: 'left', title: { display: true, text: 'GFP' } },
                            y1: { type: 'linear', position: 'right', title: { display: true, text: 'Temp' }, grid: { drawOnChartArea: false } }
                          }
                        }
                      });
                  }
                  // Show last update time
                  document.getElementById("lastUpdate").innerText = "Last updated: " + new Date().toLocaleTimeString();
              });
      }
    </script>
    <script>
    // Analyse path functions
    function loadAnalysePath() {
        fetch('/get_analyse_path')
            .then(res => res.json())
            .then(data => {
                document.getElementById('analysePathInput').value = data.csv_directory || "";
            });
    }

    function updateAnalysePath() {
        const path = document.getElementById('analysePathInput').value;
        fetch('/set_analyse_path', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ csv_directory: path })
        }).then(res => res.json())
          .then(data => {
              document.getElementById('analysePathStatus').innerText = data.status;
          });
    }
    </script>
    <script>
    // updateScriptLights: periodically checks running scripts and updates green status lights on buttons
    function updateScriptLights() {
        fetch('/running_processes')
            .then(res => res.json())
            .then(data => {
                // List of all script IDs to check
                const allScripts = ['make_dir', 'run_baseline', 'start_acclimation', 'start_feedback', 'start_mqtt', 'start_plot', 'start_analyse'];
                allScripts.forEach(scriptId => {
                    const light = document.getElementById('status-' + scriptId);
                    if (!light) return;
                    // If script is running, add green light, else remove it
                    if (data.processes.includes(scriptId)) {
                        light.classList.add("status-on");
                    } else {
                        light.classList.remove("status-on");
                    }
                });
            });
    }

    // בדיקה חוזרת כל 10 שניות (repeat check every 10 seconds)
    setInterval(updateScriptLights, 10000);
    window.onload = updateScriptLights;
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
