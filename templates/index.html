<!DOCTYPE html>
<html>
<head>
    <title>Yeast Control Panel</title>
    <style>
        body {
            background-color: #121212;
            color: #eeeeee;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
            margin-top: 20px;
        }

        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 0 10px #00ffcc33;
        }

        input[type="text"], button {
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
            border: none;
            font-size: 1rem;
        }

        button {
            background-color: #00ffcc;
            color: #000;
            cursor: pointer;
        }

        button:hover {
            background-color: #00ddaa;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin: 0 auto;
            max-width: 1400px;
        }

        #status {
            background-color: #222;
            padding: 15px;
            margin: 0 auto 20px auto;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            color: #00ffcc;
            border-bottom: 1px solid #00ffcc44;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-column, .right-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 20px;
        }
    </style>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🧬 Yeast Control Panel</h1>
    <div class="panel" id="status">
        <p>📡 Status: <span id="status-phase">Acclimation</span></p>
    </div>
    <div class="main-container">
        <div class="left-column">
            <div class="panel" id="path-form">
                <h2>🗂 Set Experiment Paths</h2>
                <form onsubmit="submitPaths(event)">
                    <label for="aggPath">AGG Path:</label>
                    <input type="text" id="aggPath" name="aggPath" placeholder="e.g. B:/path/to/AGG_CSV_FIGS"><br>
                    <label for="mqttPath">MQTT Path:</label>
                    <input type="text" id="mqttPath" name="mqttPath" placeholder="e.g. B:/path/to/mqtt.csv"><br>
                    <label for="wells">Well Numbers:</label>
                    <input type="text" id="wells" name="wells" placeholder="e.g. 1-3,6,9-12">
                    <button type="submit">Set Paths</button>
                
                </form>
                <p id="pathStatus" style="color: lime;"></p>
            </div>

            <div class="panel" id="graphs">
                <h2>📊 GFP Levels</h2>
                <button onclick="refreshDualChart()">🔄 Refresh Chart</button>
                <span id="lastUpdate" style="color: gray; font-size: 0.9rem; margin-left: 10px;"></span>
                <canvas id="gfpChart" width="700" height="300"></canvas>

            </div>
        </div>
        <div class="right-column">
            <div class="panel" id="script-controls">
                <h2>🚀 Run Experiment Scripts</h2>
                <button onclick="runScript('/start_acclimation')">Start Acclimation</button>
                <button onclick="runScript('/run_baseline')">Run Baseline</button>
                <button onclick="runScript('/start_mqtt')">Start MQTT</button>
                <button onclick="runScript('/start_feedback')">Start Feedback</button>
                <button onclick="runScript('/start_secure_feedback')">Start Secure Feedback</button>
                <button onclick="runScript('/start_plot')">Start Plot</button>
                <button onclick="checkRunning()">🟢 Show Running Scripts</button>
                <button onclick="stopScript('analize')">🛑 Stop Analize</button>
                <p id="scriptStatus" style="color: lime;"></p>
                <pre id="runningStatus" style="color: white;"></pre>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      function submitPaths(event) {
          event.preventDefault();
          const agg = document.getElementById('aggPath').value;
          const mqtt = document.getElementById('mqttPath').value;
          fetch('/set_paths', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ agg_path: agg, mqtt_path: mqtt })
          }).then(res => res.json())
            .then(data => {
                document.getElementById('pathStatus').innerText = '✅ Paths set successfully';
            })
            .catch(err => {
                document.getElementById('pathStatus').innerText = '❌ Failed to set paths';
            });
      }
      function runScript(endpoint) {
          fetch(endpoint)
              .then(res => res.json())
              .then(data => {
                  document.getElementById('scriptStatus').innerText = '✅ ' + data.status;
              })
              .catch(err => {
                  document.getElementById('scriptStatus').innerText = '❌ Failed to start script';
              });
      }

      function checkRunning() {
          fetch('/running_processes')
              .then(res => res.json())
              .then(data => {
                  document.getElementById('runningStatus').innerText =
                    Object.keys(data.processes).length > 0
                      ? JSON.stringify(data.processes, null, 2)
                      : 'No scripts running.';
              })
              .catch(err => {
                  document.getElementById('runningStatus').innerText = '❌ Failed to check running scripts';
              });
      }

      function stopScript(name) {
          fetch(`/stop_script/${name}`)
              .then(res => res.json())
              .then(data => {
                  document.getElementById('scriptStatus').innerText = '🛑 ' + data.status;
              })
              .catch(err => {
                  document.getElementById('scriptStatus').innerText = '❌ Failed to stop script';
              });
      }

      function refreshDualChart() {
          fetch("/refresh_dual_data")
              .then(res => res.json())
              .then(data => {
                  if (data.error) return;
                  const t0 = new Date(data.t0);
                  const gfpPoints = data.gfp_data.map(row => ({
                      x: (new Date(row.Time_Stamp) - t0) / 60000,
                      y: row.mean_F_C2
                  }));
                  const tempPoints = data.temp_data.map(row => ({
                      x: (new Date(row.x) - t0) / 60000,
                      y: row.y
                  }));
                  if (window.chart) {
                      window.chart.data.datasets[0].data = gfpPoints;
                      window.chart.data.datasets[1].data = tempPoints;
                      window.chart.update();
                  }
                  document.getElementById("lastUpdate").innerText = "Last updated: " + new Date().toLocaleTimeString();
              });
      }
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
